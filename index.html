<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turismo Almería - Tu Guía Inteligente</title>
    <meta name="description" content="Descubre los mejores lugares de interés en Almería, España. Cultura, monumentos, gastronomía y más.">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <span class="logo-icon">☀️</span>
                <h1>Almería<span>Turismo</span></h1>
            </div>
            <div class="nav-controls">
                <button id="install-btn" class="btn-secondary" style="display: none;">Instalar App</button>
            </div>
        </nav>
        
        <div class="filters-container">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Buscar lugares...">
                <span class="search-icon">🔍</span>
            </div>
            <div class="category-filters" id="category-filters">
                <button class="filter-chip active" data-category="todos">Todos</button>
                <button class="filter-chip" data-category="cultura">Cultura</button>
                <button class="filter-chip" data-category="museos">Museos</button>
                <button class="filter-chip" data-category="restaurantes">Restaurantes</button>
                <button class="filter-chip" data-category="monumentos históricos">Monumentos</button>
                <button class="filter-chip" data-category="recintos deportivos">Deportes</button>
            </div>
        </div>
    </header>

    <main id="app-content">
        <!-- Views will be rendered here -->
        <div id="loading-spinner" class="spinner"></div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" data-view="cards" id="nav-cards">
            <span class="nav-icon">🎴</span>
            <span class="nav-label">Tarjetas</span>
        </button>
        <button class="nav-item" data-view="lista" id="nav-lista">
            <span class="nav-icon">📜</span>
            <span class="nav-label">Lista</span>
        </button>
        <button class="nav-item" data-view="mapa" id="nav-mapa">
            <span class="nav-icon">📍</span>
            <span class="nav-label">Mapa</span>
        </button>
        <button class="nav-item" data-view="clima" id="nav-clima">
            <span class="nav-icon">🌤️</span>
            <span class="nav-label">Clima</span>
        </button>
    </nav>

    <!-- Modal for details -->
    <div id="details-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="weather.js" type="module"></script>
    <script src="map.js" type="module"></script>
    <script src="main.js" type="module"></script>
</body>
</html>
